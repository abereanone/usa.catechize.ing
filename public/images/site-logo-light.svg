      <tspan dx="16" font-size="156" font-weight="700" letter-spacing="8">USA</tspan>
    </text>

    <path d="M230 232h520" fill="none" stroke="#b22234" stroke-width="8" stroke-linecap="round" />
    <path d="M278 246h424" fill="none" stroke="#002868" stroke-width="5" stroke-linecap="round" />
