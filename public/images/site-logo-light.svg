<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 280" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">The Catechism of the USA</title>
  <desc id="logo-desc">Stacked wordmark logo with THE CATECHISM OF above a large THE USA.</desc>
  <g text-anchor="middle">
    <text
      x="490"
      y="62"
      fill="#0033a0"
      font-family="Source Sans 3, Arial, sans-serif"
      font-size="28"
      font-weight="700"
      letter-spacing="6"
    >
      THE CATECHISM OF
    </text>

    <text
      x="490"
      y="204"
